<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Picks App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      label {
        display: block;
        margin-bottom: 6px;
      }

      input,
      select {
        margin-bottom: 10px;
        padding: 5px;
      }

      button {
        margin: 10px 10px 10px 0;
        padding: 5px 10px;
      }

      table {
        margin-top: 10px;
      }

      td {
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <h1>Robot Picks</h1>
    <label for="filterField">Filter Field</label>
    <select id="filterField">
      <option value="robot_id">Robot ID</option>
      <option value="item_id">Item ID</option>
    </select>
    <label for="robotFilter">Filter Events</label>
    <input id="robotFilter" type="text" placeholder="e.g. R1 or Robot-A" />
    <button id="simulateButton" type="button">Simulate Event</button>
    <button id="clearButton" type="button">Clear All Events</button>
    <table border="1" cellpadding="5">
      <thead>
        <tr>
          <th>Robot ID</th>
          <th>Item ID</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="eventsBody"></tbody>
    </table>
    <script src="./app.js"></script>
  </body>
</html>
