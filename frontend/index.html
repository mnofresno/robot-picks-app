<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Picks App</title>
  </head>
  <body>
    <h1>Robot Picks</h1>
    <h2>Filter Events</h2>
    <label for="robotFilter">Filter by Robot ID (updates as you type)</label>
    <input id="robotFilter" type="text" placeholder="e.g. R1 or Robot-A" />
    <p id="filterHelp">This only filters the events already loaded on the page.</p>
    <h2>Simulate Pick Event</h2>
    <button id="simulateButton" type="button">Simulate Event: R1 / A</button>
    <p id="simulateHelp">Creates { robot_id: "R1", item_id: "A" }.</p>
    <table border="1">
      <thead>
        <tr>
          <th>Robot ID</th>
          <th>Item ID</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="eventsBody"></tbody>
    </table>
    <script src="./app.js"></script>
  </body>
</html>
