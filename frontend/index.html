<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Picks App</title>
  </head>
  <body>
    <h1>Robot Picks</h1>
    <label for="robotFilter">Filter by Robot ID</label>
    <input id="robotFilter" type="text" />
    <button id="simulateButton" type="button">Simulate Event</button>
    <table border="1">
      <thead>
        <tr>
          <th>Robot ID</th>
          <th>Item ID</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="eventsBody"></tbody>
    </table>
    <script src="./app.js"></script>
  </body>
</html>
